name: 添加赞助记录

on:
    issue_comment:
        types: [created]

permissions:
    contents: write
    issues: write

jobs:
    add-sponsor:
        # 仅在已关闭的 issue 上、且评论包含 "感谢您的赞赏" 时触发
        if: >
            github.event.issue.state == 'closed' &&
            contains(github.event.comment.body, '感谢您的赞赏')
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Prepare issue body
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');
                      fs.writeFileSync('/tmp/issue_body.txt', context.payload.issue.body);
                      core.info(`Issue #${context.issue.number} body saved`);

            - name: Run add-sponsor script
              working-directory: blog
              run: node scripts/github/add-sponsor.mjs "/tmp/issue_body.txt"

            - name: Commit and push
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add blog/public/sponsors.json
                  git commit -m "chore: 添加赞助记录 #${{ github.event.issue.number }}"
                  git push
