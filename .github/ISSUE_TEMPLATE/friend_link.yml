name: 友链申请
description: 申请添加友情链接
title: "[友链] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        请填写以下信息以申请友情链接，审核通过后将被添加到友链页面。
  - type: input
    id: name
    attributes:
      label: 站点名称
      placeholder: "例如：张洪Heo"
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: 站点地址
      placeholder: "https://example.com/"
    validations:
      required: true
  - type: input
    id: avatar
    attributes:
      label: 头像链接
      placeholder: "https://example.com/avatar.webp"
    validations:
      required: true
  - type: input
    id: snapshot
    attributes:
      label: 站点截图
      placeholder: "https://example.com/screenshot.webp"
    validations:
      required: true
  - type: textarea
    id: desc
    attributes:
      label: 站点描述
      placeholder: "一句话介绍你的博客"
    validations:
      required: true
  - type: input
    id: feed
    attributes:
      label: RSS 订阅地址
      placeholder: "https://example.com/atom.xml"
    validations:
      required: false
  - type: input
    id: links
    attributes:
      label: 友链页面地址
      placeholder: "https://example.com/link/"
    validations:
      required: true
